name: Deploy to VPS

on:
  push:
    branches: [main, Funil-duelo-CAPI]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/desenrola/desenrola-ai/funil-duelo
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            cd /home/desenrola/desenrola-ai
            docker compose build funil-duelo
            docker compose up -d funil-duelo
